<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none" aria-label="Comit">
  <!--
    Comit — symbol mark
    Latin "Comes" (accusative): companion, guide, one who walks beside you

    An open arc (C) — doesn't close, making space for the guide dot.
    The dot sits inside the gap: the companion, always present.

    Geometry:
      Arc center: (24, 24), radius: 17, stroke: 5, linecap: round
      Gap: 60° centered on 0° (3 o'clock)
      Arc: M 38.72 32.50 → clockwise 300° → 38.72 15.50
      Dot: (35, 24), r: 3 — inside the gap, not touching the arc stroke
  -->

  <!-- Open arc: 300° clockwise, gap on the right side -->
  <path
    d="M 38.72 32.50 A 17 17 0 1 1 38.72 15.50"
    stroke="#1d4ed8"
    stroke-width="5"
    stroke-linecap="round"
    fill="none"
  />

  <!-- Guide dot: inside the gap, the companion -->
  <circle cx="35" cy="24" r="3" fill="#1d4ed8" />
</svg>
